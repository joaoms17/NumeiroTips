    <path d="M150 352 L126 222 L200 292 L256 192 L312 292 L386 222 L362 352 Z" fill="url(#gold)"/>
    <rect x="150" y="350" width="212" height="46" rx="12" fill="url(#gold)"/>
  </g>

  <!-- gemas dos picos -->
  <g fill="#fff6d6" stroke="#9a6a1e" stroke-width="4">
    <circle cx="126" cy="222" r="17"/>
    <circle cx="256" cy="192" r="19"/>
    <circle cx="386" cy="222" r="17"/>
  </g>

  <!-- gemas da base -->
  <circle cx="256" cy="373" r="11" fill="#ff5470"/>
  <circle cx="206" cy="373" r="9" fill="#39bae6"/>
  <circle cx="306" cy="373" r="9" fill="#2ee6a6"/>
</svg>
