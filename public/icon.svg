<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#121a28"/>
      <stop offset="1" stop-color="#0a0e14"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe08a"/>
      <stop offset="0.55" stop-color="#ffc24d"/>
      <stop offset="1" stop-color="#f0a32e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.62">
      <stop offset="0" stop-color="#39bae6" stop-opacity="0.28"/>
      <stop offset="0.6" stop-color="#b083f0" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#39bae6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="220" r="190" fill="url(#glow)"/>

  <!-- coroa (dentro da zona segura maskable) -->
